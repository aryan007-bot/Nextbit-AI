services:
  - type: web
    name: nextbit-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: BACKEND_PORT
        value: 3001
      - key: NODE_ENV
        value: production
